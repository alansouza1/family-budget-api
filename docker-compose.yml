services:
  # --------------------------------------------------------------------------
  # PostgreSQL database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: family-budget-db
    environment:
      POSTGRES_DB: family_budget
      POSTGRES_USER: family_budget
      POSTGRES_PASSWORD: family_budget_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_budget -d family_budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # .NET Web API
  # --------------------------------------------------------------------------
  api:
    build:
      context: ./backend/FamilyBudget.Api
      dockerfile: Dockerfile
    container_name: family-budget-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=family_budget;Username=family_budget;Password=family_budget_pass"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # React Frontend
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-budget-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
